<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (pegawai(); as pegawaiRef) {
      <div>
        <h2 data-cy="pegawaiDetailsHeading"><span jhiTranslate="sistemKepegawaianApp.pegawai.detail.title">Pegawai</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ pegawaiRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.pegawai.nama">Nama</span></dt>
          <dd>
            <span>{{ pegawaiRef.nama }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.pegawai.jabatan">Jabatan</span></dt>
          <dd>
            <span>{{ pegawaiRef.jabatan }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.pegawai.departemen">Departemen</span></dt>
          <dd>
            <span>{{ pegawaiRef.departemen }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.pegawai.gaji">Gaji</span></dt>
          <dd>
            <span>{{ pegawaiRef.gaji }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/pegawai', pegawaiRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
