<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (cuti(); as cutiRef) {
      <div>
        <h2 data-cy="cutiDetailsHeading"><span jhiTranslate="sistemKepegawaianApp.cuti.detail.title">Cuti</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ cutiRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.cuti.tanggalMulai">Tanggal Mulai</span></dt>
          <dd>
            <span>{{ cutiRef.tanggalMulai | formatMediumDate }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.cuti.tanggalSelesai">Tanggal Selesai</span></dt>
          <dd>
            <span>{{ cutiRef.tanggalSelesai | formatMediumDate }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.cuti.alasan">Alasan</span></dt>
          <dd>
            <span>{{ cutiRef.alasan }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.cuti.status">Status</span></dt>
          <dd>
            <span>{{ cutiRef.status }}</span>
          </dd>
          <dt><span jhiTranslate="sistemKepegawaianApp.cuti.pegawai">Pegawai</span></dt>
          <dd>
            @if (cuti()!.pegawai) {
              <div>
                <a [routerLink]="['/pegawai', cuti()!.pegawai?.id, 'view']">{{ cutiRef.pegawai?.nama }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/cuti', cutiRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
